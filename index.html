<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <!-- Envelope -->
    <div class="envelope-wrapper" onclick="openEnvelope()">
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <div class="letter">
                <div class="letter-content">
                    <h1 class="names">Aarav & Meera</h1>
                    <p class="invite-text">
                        Together with our families,<br>
                        we invite you to celebrate our wedding
                    </p>

                    <div class="details">
                        <p>Saturday, 14th February 2027</p>
                        <p>5:00 PM</p>
                        <p>The Royal Palace Gardens</p>
                        <p>New Delhi, India</p>
                    </div>

                    <p class="rsvp">RSVP by 1st January 2027</p>
                </div>
            </div>
        </div>

        <p class="click-text">Click to Open</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
