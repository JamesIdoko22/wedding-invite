<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nenye & James • Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
/* =========================
   BASE STYLES
========================= */

body {
    margin: 0;
    font-family: 'Cormorant Garamond', serif;
    background: linear-gradient(135deg, #4a1320, #6b1f2c, #8b2c3d);
    color: #4a1320;
}

.screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

/* =========================
   ENVELOPE SCREEN
========================= */

.envelope-container {
    text-align: center;
}

.hero-text {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #f4d6a0;
    margin-bottom: 40px;
}

.envelope-box {
    width: 380px;
    height: 220px;
    background: linear-gradient(135deg, #e8c98a, #d4af6e);
    margin: 0 auto 40px;
    border-radius: 6px;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.envelope-box::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fdf2f5;
    clip-path: polygon(0 0, 50% 55%, 100% 0);
    border-radius: 6px 6px 0 0;
}

.seal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    background: radial-gradient(circle, #4a1320, #6b1f2c);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f4d6a0;
    font-family: 'Cinzel', serif;
    border: 2px solid #e8c98a;
}

.open-btn {
    padding: 14px 40px;
    font-family: 'Cinzel', serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 2px solid #e8c98a;
    background: transparent;
    color: #f4d6a0;
    cursor: pointer;
}

.open-btn:hover {
    background: #e8c98a;
    color: #4a1320;
}

/* =========================
   INVITATION CARD
========================= */

.invite-screen {
    display: none;
}

.invite-card {
    background: linear-gradient(to bottom, #fdf2f5, #faf3e7);
    max-width: 520px;
    padding: 50px 40px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.4);
}

.names {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    margin: 20px 0;
}

.names span {
    color: #d4af6e;
}

.divider {
    height: 1px;
    width: 60%;
    margin: 25px auto;
    background: linear-gradient(to right, transparent, #d4af6e, transparent);
}

.day {
    font-family: 'Cinzel', serif;
    letter-spacing: 4px;
    text-transform: uppercase;
}

.date-number {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: #d4af6e;
}

.venue-name {
    font-family: 'Cinzel', serif;
    margin-top: 15px;
}

.rsvp {
    margin-top: 20px;
    color: #b8860b;
}

/* Responsive */
@media (max-width: 480px) {
    .envelope-box { width: 300px; height: 180px; }
    .names { font-size: 50px; }
}
</style>

</head>
<body>

<!-- Envelope -->
<div class="screen envelope-screen" id="envelopeScreen">
    <div class="envelope-container">
        <div class="hero-text">You're cordially invited</div>

        <div class="envelope-box">
            <div class="seal">N<br>&<br>J</div>
        </div>

        <button class="open-btn" onclick="openInvite()">Open Invitation</button>
    </div>
</div>

<!-- Invitation -->
<div class="screen invite-screen" id="inviteScreen">
    <div class="invite-card">

        <p>Together with their families</p>

        <h1 class="names">
            Nenye <span>&</span> James
        </h1>

        <div class="divider"></div>

        <p>request the honour of your presence<br>
        at the celebration of their marriage</p>

        <div class="divider"></div>

        <p class="day">Saturday</p>
        <p>September <span class="date-number">5</span> 2026</p>
        <p>at two o'clock in the afternoon</p>

        <div class="divider"></div>

        <p class="venue-name">Space and Function</p>
        <p>Wuse II, Abuja</p>

        <p class="rsvp">Kindly RSVP by 1st August 2026</p>

    </div>
</div>

<script>
function openInvite() {
    document.getElementById("envelopeScreen").style.display = "none";
    document.getElementById("inviteScreen").style.display = "flex";
}
</script>

</body>
</html>
