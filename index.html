<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #701020 0%, #902030 50%, #f8d7da 100%);
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Soft falling petals */
        .petal {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f8d7da;
            opacity: 0.6;
            pointer-events: none;
            animation: fall linear infinite;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            padding: 20px;
        }

        .envelope-wrapper {
            cursor: pointer;
            position: relative;
            animation: gentleFloat 6s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .envelope-wrapper:hover {
            animation: none;
            transform: translateY(-5px);
            transition: transform 0.3s ease;
        }

        .envelope {
            width: 380px;
            height: 240px;
            background: #f3e5d8;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #701020;
            clip-path: polygon(0 0, 50% 55%, 100% 0);
            transform-origin: top;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px 8px 0 0;
            z-index: 10;
        }

        .flap::after {
            content: '';
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .letter {
            position: absolute;
            width: 92%;
            height: 190%;
            background: #fff5f8;
            top: 8%;
            left: 4%;
            border-radius: 6px;
            transition: transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(110%);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            z-index: 5;
        }

        .letter-content {
            padding: 30px 25px;
            opacity: 0;
            transition: opacity 0.8s ease 0.7s;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 42px;
            color: #701020;
            margin: 0 0 15px 0;
            font-weight: normal;
        }

        .invite-text {
            font-size: 15px;
            color: #5a3e36;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .details {
            font-size: 15px;
            color: #444;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .rsvp {
            font-weight: 500;
            color: #b8860b;
            font-size: 14px;
        }

        .hint {
            margin-top: 25px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            text-align: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Open State */
        .envelope.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope.open .letter {
            transform: translateY(-45%);
        }

        .envelope.open .letter-content {
            opacity: 1;
        }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .envelope {
                width: 310px;
                height: 200px;
            }

            .names {
                font-size: 36px;
            }

            .letter-content {
                padding: 22px 18px;
            }

            .invite-text, .details {
                font-size: 14px;
            }
        }

    </style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="container">
    <div class="envelope-wrapper" onclick="openEnvelope()">
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <div class="letter">
                <div class="letter-content">
                    <h1 class="names">James & Bride</h1>
                    <p class="invite-text">
                        Together with our families,<br>
                        we invite you to celebrate our wedding
                    </p>

                    <div class="details">
                        <p>Saturday, 14th February 2027</p>
                        <p>5:00 PM</p>
                        <p>The Royal Palace Gardens</p>
                        <p>New Delhi, India</p>
                    </div>

                    <p class="rsvp">RSVP by 1st January 2027</p>
                </div>
            </div>
        </div>

        <p class="hint">Tap to Open</p>
    </div>
</div>

<script>
function openEnvelope() {
    document.getElementById("envelope").classList.toggle("open");
}

// Create falling petals
function createPetal() {
    const petal = document.createElement('div');
    petal.classList.add('petal');
    petal.style.left = Math.random() * 100 + 'vw';
    petal.style.animationDuration = Math.random() * 10 + 15 + 's';
    petal.style.animationDelay = Math.random() * 10 + 's';
    petal.style.width = Math.random() * 10 + 5 + 'px';
    petal.style.height = petal.style.width;
    document.body.appendChild(petal);

    setTimeout(() => {
        petal.remove();
    }, 25000);
}

setInterval(createPetal, 800);

for(let i = 0; i < 10; i++) {
    setTimeout(createPetal, i * 300);
}
</script>

</body>
</html>
