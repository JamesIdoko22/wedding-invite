<!-- Envelope Screen -->
<div class="screen envelope-screen" id="envelopeScreen">

    <div class="hero-wrapper">

        <p class="hero-subtitle">You're cordially invited</p>

        <div class="lux-envelope" id="luxEnvelope">

            <div class="light-sweep"></div>

            <div class="lux-envelope-body"></div>

            <div class="lux-envelope-flap" id="envelopeFlap"></div>

            <div class="lux-seal">
                <span>N<br>&<br>J</span>
            </div>

        </div>

        <button class="open-btn" onclick="openEnvelope()">
            Open Invitation
        </button>

    </div>

    <!-- Sparkle Container -->
    <div id="sparkleContainer"></div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c7c59c7e4.mp3?filename=wedding-romantic-ambient-110397.mp3" type="audio/mpeg">
    </audio>

</div>
